    /* ================================================
       ROOT VARIABLES & GLOBAL RESET
    ================================================ */
    :root {
      --purple-deep: #2D0A5E;
      --purple-mid: #6C2BD9;
      --purple-light: #A855F7;
      --pink-hot: #EC4899;
      --pink-light: #F472B6;
      --pink-pale: #FBCFE8;
      --cyan-glow: #22D3EE;
      --white: #FFFFFF;
      --white-80: rgba(255,255,255,0.80);
      --white-20: rgba(255,255,255,0.20);
      --white-10: rgba(255,255,255,0.10);
      --white-05: rgba(255,255,255,0.05);
      --dark-bg: #0F0520;
      --dark-card: #1A0A35;
      --text-main: #F3E8FF;
      --text-sub: #C4B5FD;
      --text-muted: rgba(196,181,253,0.65);
      --grad-main: linear-gradient(135deg, #6C2BD9 0%, #EC4899 100%);
      --grad-hero: linear-gradient(135deg, #2D0A5E 0%, #6C2BD9 40%, #EC4899 100%);
      --grad-card: linear-gradient(135deg, rgba(108,43,217,0.25) 0%, rgba(236,72,153,0.15) 100%);
      --grad-glow: linear-gradient(135deg, #A855F7, #EC4899);
      --shadow-glow: 0 0 30px rgba(168,85,247,0.40), 0 0 60px rgba(236,72,153,0.20);
      --shadow-card: 0 8px 32px rgba(45,10,94,0.50);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--dark-bg);
      color: var(--text-main);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--dark-bg); }
    ::-webkit-scrollbar-thumb { background: var(--grad-main); border-radius: 999px; }

    /* ================================================
       PAGE SYSTEM — JS toggles .active-page
    ================================================ */
    .page { display: none; animation: fadeInPage 0.4s ease; }
    .page.active-page { display: block; }

    @keyframes fadeInPage {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ================================================
       ANIMATED BACKGROUND ORBS
    ================================================ */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
    }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.18; animation: floatOrb 12s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: #6C2BD9; top: -120px; left: -120px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: #EC4899; bottom: -100px; right: -80px; animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: #A855F7; top: 50%; left: 50%; animation-delay: -8s; }
